kind = "web"
previewPath = "/"
title = "Aurelia & Co."
version = "1.0.0"
id = "artifacts/aurelia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21224

[services.development]
run = "pnpm --filter @workspace/aurelia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aurelia", "run", "build" ]
publicDir = "artifacts/aurelia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21224"
BASE_PATH = "/"
